<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plataforma de Viáticos</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-container h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .login-container p {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover {
            background-color: #1e40af;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Plataforma de Automatización de Viáticos</h1>
        <p>Ingrese sus credenciales para acceder</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="required">Usuario</label>
                <input type="text" class="form-control" id="usuario" placeholder="Ingrese su usuario" required>
            </div>

            <div class="form-group">
                <label class="required">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <div style="margin-top: 20px; text-align: center; font-size: 12px; color: #6b7280;">
            <p>Usuarios de prueba:</p>
            <p><strong>Admin Total:</strong> mrifo / password</p>
            <p><strong>Admin Parcial:</strong> crewtracking / password</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
